name: Code of Conduct Check

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  check-conduct:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check for prohibited words
        uses: actions/github-script@v7
        with:
          script: |
            const badWords = [
              'cazzo', 'merda', 'stronzo', 'coglione', 'vaffanculo',
              'fanculo', 'idiota', 'ritardato', 'incapace', 'schifo'
            ];

            const issue = context.payload.issue;
            const text = `${issue.title} ${issue.body}`.toLowerCase();

            const found = badWords.filter(word => text.includes(word));

            if (found.length > 0) {

              // Posta commento warning
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `👋 Ciao!\nSembra che questa issue possa contenere elementi in contrasto con il Codice di Condotta di Dokyll.\nPuoi consultarlo qui: https://github.com/dokyll/dokyll/blob/main/.github/CODE_OF_CONDUCT.md\nHai 7 giorni di tempo per correggere l'issue ed evitare la generazione di un report automatico.\nGrazie!`
              });

              // Aggiungi label di moderazione
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['da-moderare', 'non-letto']
              });

              core.info(`Trovate parole: ${found.join(', ')}`);

            } else {

              core.info('Nessuna violazione trovata');

              // Ricarica issue aggiornata (IMPORTANTE)
              const { data: freshIssue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              const hasModerationLabel = freshIssue.labels.some(
                label => label.name === 'da-moderare'
              );

              if (hasModerationLabel) {

                // Rimuove label da-moderare
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'da-moderare'
                  });
                } catch (e) {
                  core.info('Label da-moderare già assente');
                }

                // Rimuove label non-letto
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'non-letto'
                  });
                } catch (e) {
                  core.info('Label non-letto già assente');
                }

                // Commento di conferma
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Grazie!\n\nNon sono più state rilevate possibili violazioni del Codice di Condotta di Dokyll.\nLe etichette di moderazione sono state rimosse automaticamente e non verrà generato alcun report automatico.`
                });

                core.info('Moderazione risolta automaticamente');
              }
            }
